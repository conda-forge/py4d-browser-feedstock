{% set python_min = "3.11" %}
{% set name = "py4D-browser" %}
{% set version = "1.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/py4d_browser-{{ version }}.tar.gz
  sha256: 7bce7ad529e88002b26a44e8d28794a377685df1af3d53ed4ca0c194105dd877

build:
  entry_points:
    - py4DGUI = py4D_browser.runGUI:launch
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - pip
  run:
    - python >={{ python_min }}
    - py4dstem >=0.14.9
    - h5py
    - numpy >=1.19
    - matplotlib-base >=3.2.2
    - platformdirs
    - pyqt >=5.10
    - pyqtgraph >=0.11
    - sigfig

test:
  imports:
    - py4D_browser
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/py4dstem/py4D-browser
  summary: A 4D-STEM data browser built on py4DSTEM.
  license: GPL-3.0-only
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - sezelt
